<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Row 1: 3 ring circles -->
  <circle cx="12" cy="12" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="12" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  <circle cx="52" cy="12" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>

  <!-- Row 2: 3 ring circles + horizontal bar left-middle -->
  <circle cx="12" cy="32" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="32" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  <circle cx="52" cy="32" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  <line x1="17" y1="32" x2="27" y2="32" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

  <!-- Row 3: 3 ring circles -->
  <circle cx="12" cy="52" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="52" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  <circle cx="52" cy="52" r="5" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>

  <!-- X pattern: bottom-right quadrant diagonals -->
  <line x1="37" y1="37" x2="47" y2="47" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <line x1="47" y1="37" x2="37" y2="47" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
</svg>
