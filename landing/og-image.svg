<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F8F6"/>
      <stop offset="100%" stop-color="#EEEDEB"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid pattern (faint) -->
  <g opacity="0.05">
    <rect x="60" y="60" width="1080" height="510" fill="none" stroke="#1B365D" stroke-width="1"/>
    <line x1="60" y1="230" x2="1140" y2="230" stroke="#1B365D"/>
    <line x1="60" y1="400" x2="1140" y2="400" stroke="#1B365D"/>
  </g>

  <!-- Logo + wordmark -->
  <g transform="translate(600, 140)">
    <!-- Brain/grid icon -->
    <g transform="translate(-250, -40)">
      <rect x="0" y="0" width="90" height="90" rx="18" fill="#1B365D"/>
      <g fill="none" stroke="white" stroke-width="4" stroke-linecap="round">
        <line x1="22" y1="28" x2="68" y2="28"/>
        <line x1="22" y1="45" x2="68" y2="45"/>
        <line x1="22" y1="62" x2="68" y2="62"/>
        <line x1="28" y1="22" x2="28" y2="68"/>
        <line x1="45" y1="22" x2="45" y2="68"/>
        <line x1="62" y1="22" x2="62" y2="68"/>
      </g>
    </g>
    <text x="-140" y="20" font-family="Montserrat, system-ui, sans-serif" font-size="80" font-weight="700" fill="#0D0D0D" letter-spacing="-2">logiclass</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="Montserrat, system-ui, sans-serif" font-size="48" font-weight="700" fill="#1B365D" direction="rtl">
    בינה מלאכותית שבונה
  </text>
  <text x="600" y="380" text-anchor="middle" font-family="Montserrat, system-ui, sans-serif" font-size="48" font-weight="700" fill="#0D0D0D" direction="rtl">
    מערכת שעות מיטבית
  </text>

  <!-- Subtitle -->
  <text x="600" y="440" text-anchor="middle" font-family="Montserrat, system-ui, sans-serif" font-size="24" fill="#6B6560" direction="rtl">
    מודל אופטימיזציה + ליווי מקצועי
  </text>

  <!-- Feature chips -->
  <g transform="translate(600, 520)" direction="rtl">
    <g transform="translate(-360, 0)">
      <rect x="0" y="-22" width="220" height="48" rx="24" fill="white" stroke="#E8E6E3" filter="url(#shadow)"/>
      <text x="110" y="7" text-anchor="middle" font-family="Montserrat" font-size="18" font-weight="500" fill="#0D0D0D">27 סוגי אילוצים</text>
    </g>
    <g transform="translate(-110, 0)">
      <rect x="0" y="-22" width="220" height="48" rx="24" fill="white" stroke="#E8E6E3" filter="url(#shadow)"/>
      <text x="110" y="7" text-anchor="middle" font-family="Montserrat" font-size="18" font-weight="500" fill="#0D0D0D">סנכרון עם שחף</text>
    </g>
    <g transform="translate(140, 0)">
      <rect x="0" y="-22" width="220" height="48" rx="24" fill="#1B365D" filter="url(#shadow)"/>
      <text x="110" y="7" text-anchor="middle" font-family="Montserrat" font-size="18" font-weight="600" fill="white">שעות במקום שבועות</text>
    </g>
  </g>
</svg>
